<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل HydraStream - بدون إعلانات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            direction: ltr;
        }
        .controls input:focus {
            outline: 2px solid #00d4ff;
            background: #1a1a1a;
        }
        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #00d4ff;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .controls button:hover {
            background: #00b8d4;
            transform: scale(1.02);
        }
        .info {
            margin-top: 12px;
            font-size: 13px;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        .info span {
            color: #00d4ff;
        }
        select {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        select:focus {
            outline: 2px solid #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 HydraStream · مشغل بدون إعلانات</h1>

        <!-- 1️⃣ حقل إدخال الرابط -->
        <div class="controls">
            <input type="text" id="videoUrl" placeholder="ألصق رابط التضمين (مثل: https://vidsrc.pm/embed/movie/tt1375666)" value="https://vidsrc.pm/embed/movie/tt1375666">
            <button onclick="loadVideo()">▶️ تشغيل</button>
        </div>

        <!-- 2️⃣ خيارات Sandbox -->
        <div class="controls" style="margin-top: 5px;">
            <label style="font-size:13px; color:#aaa;">🔒 خيارات الحماية:</label>
            <select id="sandboxMode">
                <option value="allow-scripts allow-same-origin allow-popups allow-top-navigation">🛡️ متوازن (يوصى به)</option>
                <option value="allow-scripts allow-same-origin allow-popups">🚫 منع النوافذ المنبثقة</option>
                <option value="allow-scripts allow-same-origin">📦 أساسي (قد تظهر إعلانات)</option>
                <option value="">🔒 صارم (قد يُعطّل الفيديو)</option>
            </select>
            <button onclick="loadVideo()" style="background:#555;">تطبيق</button>
        </div>

        <!-- 3️⃣ مشغل الفيديو -->
        <div class="video-wrapper" id="playerWrapper">
            <iframe id="player"
                src="https://vidsrc.pm/embed/movie/tt1375666"
                sandbox="allow-scripts allow-same-origin allow-popups allow-top-navigation"
                allowfullscreen>
            </iframe>
        </div>

        <!-- 4️⃣ معلومات إضافية -->
        <div class="info">
            💡 <span>مصادر مُقترحة خالية من الإعلانات:</span>
            <span id="suggestion">MoviesAPI, Videasy, VidCore</span>
            <br>
            <span style="font-size:12px; color:#666;">
                ✅ الإطار محمي بـ sandbox لمنع النوافذ المنبثقة والإعلانات الخادعة
            </span>
        </div>
    </div>

    <script>
        // دالة تحميل الفيديو
        function loadVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const mode = document.getElementById('sandboxMode').value;
            const iframe = document.getElementById('player');

            if (!url) {
                alert('الرجاء إدخال رابط صحيح!');
                return;
            }

            // تحديث الـ src و sandbox
            iframe.src = url;
            iframe.sandbox = mode;

            console.log(`🎥 تم التحميل: ${url}`);
            console.log(`🔒 وضع Sandbox: "${mode}"`);
        }

        // تحميل تلقائي عند بدء الصفحة
        window.onload = function() {
            // إذا كان هناك رابط في الـ URL
            const params = new URLSearchParams(window.location.search);
            const urlParam = params.get('url');
            if (urlParam) {
                document.getElementById('videoUrl').value = urlParam;
            }
            loadVideo();
        };

        // دالة لتغيير المصدر بسرعة
        function quickSource(source) {
            document.getElementById('videoUrl').value = source;
            loadVideo();
        }

        // اختصار للوحة المفاتيح (Enter)
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('videoUrl').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') loadVideo();
            });
        });

        console.log('🚀 HydraStream Player جاهز!');
        console.log('📌 استخدم المتصفح مع إضافة uBlock Origin للحصول على أفضل تجربة.');
    </script>
</body>
</html>
